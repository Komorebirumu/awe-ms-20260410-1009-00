<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .background { fill: #f0f2f5; }
    .primary-color { fill: #4285f4; } /* Google Blue */
    .secondary-color { fill: #34a853; } /* Google Green */
    .accent-color { fill: #fbbc04; } /* Google Yellow */
    .text-color { fill: #3c4043; } /* Google Dark Gray */
    .icon-color { fill: #ffffff; }
    .shadow { fill: rgba(0, 0, 0, 0.1); }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="background"/>

  <!-- Main Illustration Elements -->

  <!-- AI Brain/Core -->
  <g transform="translate(250, 200)">
    <circle cx="150" cy="150" r="70" class="primary-color"/>
    <path d="M 150 80 L 130 100 L 150 120 L 170 100 Z M 150 120 L 130 140 L 150 160 L 170 140 Z M 150 160 L 130 180 L 150 200 L 170 180 Z" class="accent-color"/>
    <circle cx="150" cy="150" r="30" class="secondary-color"/>
    <circle cx="150" cy="150" r="10" class="icon-color"/>
  </g>

  <!-- Input/Source Art Representation -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="100" height="100" rx="10" ry="10" class="primary-color"/>
    <path d="M 25 25 L 75 25 L 75 75 L 25 75 Z M 40 40 L 60 40 L 60 60 L 40 60 Z" class="icon-color"/>
    <text x="50" y="115" text-anchor="middle" class="text-color" font-size="14" font-weight="bold">Source Art</text>
  </g>

  <!-- Translation Arrows/Process -->
  <g transform="translate(380, 270)">
    <path d="M 0 0 L 100 50 L 0 100 Z" class="secondary-color"/>
    <path d="M 100 50 L 0 0 L 0 100 Z" class="accent-color"/>
    <line x1="70" y1="20" x2="120" y2="50" stroke-width="4" stroke="#fbbc04" marker-end="url(#arrowhead)"/>
    <line x1="70" y1="80" x2="120" y2="50" stroke-width="4" stroke="#34a853" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0 10 3.5 0 7" fill="#3c4043"/>
    </marker>
  </defs>

  <!-- Output/Translated Art Representation -->
  <g transform="translate(500, 250)">
    <rect x="0" y="0" width="100" height="100" rx="10" ry="10" class="secondary-color"/>
    <circle cx="50" cy="50" r="30" class="icon-color"/>
    <text x="50" y="115" text-anchor="middle" class="text-color" font-size="14" font-weight="bold">Translated Art</text>
  </g>

  <!-- Niche Label -->
  <text x="400" y="50" text-anchor="middle" class="text-color" font-size="36" font-weight="bold">AI-Driven Niche Visual Art Style Translator</text>

  <!-- Subtle background elements for depth -->
  <circle cx="50" cy="50" r="20" class="accent-color" opacity="0.3"/>
  <circle cx="750" cy="550" r="30" class="primary-color" opacity="0.3"/>
  <rect x="10" y="550" width="40" height="40" rx="5" ry="5" class="secondary-color" opacity="0.3"/>

</svg>